<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT3E_KHSV2526_031 | Hệ Thống Mã Hóa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* GIỮ NGUYÊN CSS CỦA BẠN - ĐÃ TỐI ƯU CHO GIAO DIỆN */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #050505; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-y: auto; padding: 40px 20px; }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.8; pointer-events: none; }
        .view-section { display: none; width: 100%; max-width: 850px; z-index: 10; position: relative; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); margin: auto; }
        .view-section.active { display: block; }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .card { background: rgba(255, 255, 255, 0.97); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center; }
        h1, h2, h3 { color: #111; font-weight: 600; letter-spacing: -0.5px; }
        .hero-banner { background: linear-gradient(135deg, #1a237e, #3498db 100%); color: white; padding: 40px; border-radius: 12px; margin-bottom: 20px; }
        .form-group { margin-bottom: 25px; text-align: left; }
        .form-input { width: 100%; padding: 14px 16px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; }
        .btn { padding: 14px 28px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; display: inline-flex; justify-content: center; gap: 8px; }
        .btn-primary { background: #2563eb; color: white; }
        .drop-zone { border: 2px dashed #cbd5e1; border-radius: 16px; padding: 50px 20px; background: #f8fafc; cursor: pointer; margin-bottom: 25px; }
        .loader { border: 4px solid #f1f5f9; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-box { margin-top: 25px; padding: 25px; background: #ecfdf5; border-radius: 12px; border: 1px solid #a7f3d0; text-align: left; }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <section id="landing-page" class="view-section active">
        <div class="card">
            <div class="hero-banner">
                <h1>🔒 Hệ Thống Bảo Mật IT3E</h1>
                <p>Mã hóa AES-256 & Chia mảnh bí mật Shamir</p>
            </div>
            <button class="btn btn-primary" onclick="switchView('register-page')">🚀 Khởi Tạo Nhóm Nghiên Cứu</button>
        </div>
    </section>

    <section id="register-page" class="view-section">
        <div class="card">
            <h2 style="margin-bottom: 20px;">Thiết Lập Thông Số Nhóm</h2>
            <div class="form-group">
                <label>Tên Trưởng Nhóm</label>
                <input type="text" id="leaderName" class="form-input" placeholder="VD: Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label>Tổng số thành viên (n)</label>
                <input type="number" id="maxMembers" class="form-input" value="5" min="2">
            </div>
            <div class="form-group">
                <label>Số người cần để mở khóa (k)</label>
                <input type="number" id="threshold" class="form-input" value="3" min="2">
            </div>
            <button class="btn btn-primary" onclick="createGroup()">Tiếp Tục ➡</button>
        </div>
    </section>

    <section id="dashboard-page" class="view-section">
        <div class="card">
            <h2 style="text-align: left;">Xin chào, <span id="displayLeader" style="color: #2563eb;"></span>!</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0;">
                <div class="card" style="padding: 20px; background: #f8fafc;" onclick="switchView('encrypt-page')">
                    <h3>🔒 Mã Hóa</h3>
                </div>
                <div class="card" style="padding: 20px; background: #f8fafc;" onclick="alert('Chức năng đang phát triển!')">
                    <h3>🔓 Giải Mã</h3>
                </div>
            </div>
        </div>
    </section>

    <section id="encrypt-page" class="view-section">
        <div class="card">
            <button class="btn" style="width: auto; background: #eee;" onclick="switchView('dashboard-page')">⬅ Quay lại</button>
            <h2 style="margin: 20px 0;">Tải Lên File Cần Bảo Mật</h2>
            
            <div class="drop-zone" id="encDropZone">
                <span style="font-size: 40px;">📁</span>
                <p id="encFileName">Kéo thả file vào đây hoặc Nhấn để chọn</p>
                <input type="file" id="encFileInput" style="display: none;">
            </div>

            <button class="btn btn-primary" id="btnEncrypt" onclick="processEncryption()">Bắt Đầu Mã Hóa</button>
            
            <div id="loadingEnc" class="hidden"><div class="loader"></div><p>Đang xử lý dữ liệu trên Server...</p></div>
            
            <div id="encryptResult" class="hidden result-box"></div>
        </div>
    </section>

    <script>
        // === CẤU HÌNH KẾT NỐI BACKEND ===
        const SERVER_URL = "https://webnckh.onrender.com";

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        let config = { n: 5, k: 3 };

        function createGroup() {
            config.n = document.getElementById('maxMembers').value;
            config.k = document.getElementById('threshold').value;
            document.getElementById('displayLeader').innerText = document.getElementById('leaderName').value || "Admin";
            switchView('dashboard-page');
        }

        // Xử lý chọn file
        const dropZone = document.getElementById('encDropZone');
        const fileInput = document.getElementById('encFileInput');
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            if(fileInput.files[0]) document.getElementById('encFileName').innerText = "Đã chọn: " + fileInput.files[0].name;
        };

        // HÀM GỬI DỮ LIỆU LÊN SERVER RENDER
        async function processEncryption() {
            const file = fileInput.files[0];
            if(!file) return alert("Vui lòng chọn file!");

            // Hiện loading
            document.getElementById('loadingEnc').classList.remove('hidden');
            document.getElementById('btnEncrypt').classList.add('hidden');
            document.getElementById('encryptResult').classList.add('hidden');

            const formData = new FormData();
            formData.append("file", file);
            formData.append("n", config.n);
            formData.append("k", config.k);
            formData.append("rsa_pass", "admin123"); // Password mặc định khớp với BE

            try {
                // Gọi API tới Render
                const response = await fetch(`${SERVER_URL}/api/encrypt`, {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.status === "success") {
                    document.getElementById('loadingEnc').classList.add('hidden');
                    const resultBox = document.getElementById('encryptResult');
                    resultBox.classList.remove('hidden');

                    // Hiển thị các mảnh khóa trả về từ BE
                    resultBox.innerHTML = `
                        <h3 style="color: #10b981;">✅ Mã hóa thành công!</h3>
                        <p>Dưới đây là <b>${config.n} mảnh khóa</b> bí mật. Hãy gửi cho các thành viên:</p>
                        <div style="background: white; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 150px; overflow-y: auto; margin: 10px 0;">
                            ${data.shares.map((s, i) => `<div><b>Mảnh ${i+1}:</b> ${s}</div><hr style="opacity:0.2">`).join('')}
                        </div>
                        <a href="${data.download_url}" target="_blank" class="btn btn-primary" style="background: #10b981; text-decoration: none;">📥 Tải File Đã Mã Hóa (.enc)</a>
                    `;
                } else {
                    alert("Lỗi server: " + data.message);
                }
            } catch (error) {
                console.error(error);
                alert("Không thể kết nối tới Server Render. Hãy kiểm tra xem Backend đã 'Wake up' chưa!");
            } finally {
                document.getElementById('loadingEnc').classList.add('hidden');
                document.getElementById('btnEncrypt').classList.remove('hidden');
            }
        }

        // Hiệu ứng Matrix
        window.onload = () => {
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const columns = Math.floor(canvas.width / 20);
            const drops = Array(columns).fill(1);
            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0F0'; ctx.font = '15px monospace';
                drops.forEach((y, i) => {
                    const text = String.fromCharCode(Math.random() * 128);
                    ctx.fillText(text, i * 20, y * 20);
                    if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }
            setInterval(draw, 33);
        };
    </script>
</body>
</html>
